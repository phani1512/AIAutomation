<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screenshot Test - Simple Version</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .upload-section, .results-section {
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 3px;
        }
        button:hover {
            background: #0056b3;
        }
        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 3px;
            overflow-x: auto;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 3px;
            margin: 10px 0;
        }
        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 3px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Screenshot Test Generator - Simple Version</h1>
    
    <div class="upload-section">
        <h2>Step 1: Upload Screenshot</h2>
        <input type="file" id="fileInput" accept="image/*">
        <button onclick="analyzeScreenshot()">Analyze Screenshot</button>
    </div>
    
    <div class="results-section" id="resultsSection" style="display:none;">
        <h2>Analysis Results</h2>
        <div id="status"></div>
        <h3>Raw Response:</h3>
        <pre id="rawResponse"></pre>
        <button onclick="generateCode()">Generate Test Code</button>
    </div>
    
    <div class="results-section" id="codeSection" style="display:none;">
        <h2>Generated Test Code</h2>
        <pre id="generatedCode"></pre>
    </div>

    <script>
        let currentData = null;

        async function analyzeScreenshot() {
            const fileInput = document.getElementById('fileInput');
            const statusDiv = document.getElementById('status');
            
            if (!fileInput.files || !fileInput.files[0]) {
                statusDiv.innerHTML = '<div class="error">Please select a file first!</div>';
                return;
            }

            const formData = new FormData();
            formData.append('screenshot', fileInput.files[0]);

            try {
                statusDiv.innerHTML = '<div>⏳ Analyzing screenshot...</div>';
                
                const response = await fetch('http://localhost:5002/screenshot/analyze', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                currentData = data;

                document.getElementById('rawResponse').textContent = JSON.stringify(data, null, 2);
                document.getElementById('resultsSection').style.display = 'block';
                statusDiv.innerHTML = '<div class="success">✅ Analysis complete!</div>';

            } catch (error) {
                console.error('Error:', error);
                statusDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }

        async function generateCode() {
            if (!currentData) {
                alert('Please analyze a screenshot first!');
                return;
            }

            try {
                const response = await fetch('http://localhost:5002/screenshot/generate-code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(currentData)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                document.getElementById('generatedCode').textContent = result.test_code || 'No code generated';
                document.getElementById('codeSection').style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                alert(`Error generating code: ${error.message}`);
            }
        }
    </script>
</body>
</html>
