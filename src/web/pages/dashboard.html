<!-- Dashboard Page -->
<section id="dashboardPage" class="page-section active">
    <div class="container" style="padding-top: var(--space-6); padding-bottom: var(--space-8);">
        
        <!-- Key Metrics Grid -->
        <div class="dashboard-grid">
            <!-- Total Tests Card -->
            <div class="dashboard-card">
                <div class="dashboard-metric">
                    <div class="dashboard-metric-header">
                        <div>
                            <div class="dashboard-metric-value" id="dashboardTotalRequests">0</div>
                            <div class="dashboard-metric-label">Total Tests Generated</div>
                        </div>
                        <div class="dashboard-metric-icon">✨</div>
                    </div>
                </div>
            </div>

            <!-- Tests Passed Card -->
            <div class="dashboard-card">
                <div class="dashboard-metric">
                    <div class="dashboard-metric-header">
                        <div>
                            <div class="dashboard-metric-value" id="testsPassedCount">0</div>
                            <div class="dashboard-metric-label">Tests Passed</div>
                        </div>
                        <div class="dashboard-metric-icon">✅</div>
                    </div>
                </div>
            </div>

            <!-- Tests Failed Card -->
            <div class="dashboard-card">
                <div class="dashboard-metric">
                    <div class="dashboard-metric-header">
                        <div>
                            <div class="dashboard-metric-value" id="testsFailedCount">0</div>
                            <div class="dashboard-metric-label">Tests Failed</div>
                        </div>
                        <div class="dashboard-metric-icon">❌</div>
                    </div>
                </div>
            </div>

            <!-- Avg Response Time Card -->
            <div class="dashboard-card">
                <div class="dashboard-metric">
                    <div class="dashboard-metric-header">
                        <div>
                            <div class="dashboard-metric-value" id="dashboardAvgTime">0ms</div>
                            <div class="dashboard-metric-label">Avg Response Time</div>
                        </div>
                        <div class="dashboard-metric-icon">⚡</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent Test Results -->
        <div class="card mt-8">
            <div class="card-header">
                <h3 class="card-title">
                    <span class="card-title-icon">🧪</span>
                    Recent Test Results
                </h3>
            </div>
            <div class="card-body">
                <div id="recentTestResults">
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <div class="empty-state-title">No test results yet</div>
                        <div class="empty-state-description">
                            Start generating and running tests to see results here
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Activity Timeline -->
        <div class="card mt-6">
            <div class="card-header">
                <h3 class="card-title">
                    <span class="card-title-icon">📈</span>
                    Activity Timeline
                </h3>
            </div>
            <div class="card-body">
                <div id="activityTimeline">
                    <div class="empty-state">
                        <div class="empty-state-icon">⏱️</div>
                        <div class="empty-state-title">No activity yet</div>
                        <div class="empty-state-description">
                            Your activity will appear here as you work
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
    </div>
</section>
