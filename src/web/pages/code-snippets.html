<!-- Code Snippets Page -->
<section id="snippetsPage" class="page-section">
    <div style="max-width: 1400px; margin: 0 auto; padding: 0 20px 20px 20px;">
        <div class="card">
            <h3 class="section-header">📚 Code Snippet Library</h3>
            
            <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="snippetSearch" placeholder="🔍 Search snippets..." oninput="filterSnippets()" style="flex: 1; min-width: 200px; padding: 10px; border: 2px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-primary);">
                <select id="snippetFilter" onchange="filterSnippets()" style="padding: 10px; min-width: 150px; border: 2px solid var(--border-color); border-radius: 6px; background: var(--input-bg); color: var(--text-primary);">
                    <option value="all">All Languages</option>
                    <option value="java">Java</option>
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                    <option value="csharp">C#</option>
                </select>
                <button class="btn" onclick="showAddSnippetModal()" style="white-space: nowrap; flex-shrink: 0;">
                    ➕ Add Snippet
                </button>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px; align-items: center; padding: 10px; background: var(--bg-secondary); border-radius: 6px;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="selectAllSnippets" onchange="toggleSelectAllSnippets()" style="cursor: pointer; width: 18px; height: 18px;">
                    <span style="color: var(--text-primary); font-weight: 500;">Select All</span>
                </label>
                <button id="deleteSelectedBtn" class="btn" onclick="deleteSelectedSnippets()" style="background: var(--error); display: none; margin-left: auto;">
                    🗑️ Delete Selected
                </button>
            </div>

            <div id="snippetsList" style="max-height: 400px; overflow-y: auto;">
                <!-- Snippets will be loaded here -->
                <div style="padding: 20px; text-align: center; color: var(--text-secondary);">
                    No snippets yet. Save your first snippet!
                </div>
            </div>
        </div>
    </div>
</section>
