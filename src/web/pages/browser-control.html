<!-- Browser Control Page -->
<section id="browserPage" class="page-section">
    <div style="max-width: 1400px; margin: 0 auto; padding: 0 20px 20px 20px;">
        <div class="section-row">
            <div class="card">
                <h3 class="section-header">🌐 Browser Control</h3>
                <div id="browserTab" class="tab-content">
                    <div class="form-group">
                        <label for="browserType">Browser:</label>
                        <select id="browserType">
                            <option value="chrome">Chrome</option>
                            <option value="firefox">Firefox</option>
                            <option value="edge">Edge</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="headlessMode"> Run in Headless Mode
                        </label>
                    </div>

                    <button class="btn" onclick="initializeBrowser()" id="initBrowserBtn">
                        🚀 Initialize Browser
                    </button>

                    <div class="form-group" style="margin-top: 20px;">
                        <label for="browserUrl">Navigate to URL:</label>
                        <input type="text" id="browserUrl" placeholder="https://example.com">
                    </div>

                    <div class="form-group">
                        <label for="browserPrompt">Test Prompt:</label>
                        <textarea id="browserPrompt" placeholder="Example: click login button"></textarea>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button class="btn" onclick="executeInBrowser()">
                            ▶️ Execute in Browser
                        </button>
                        <button class="btn" onclick="closeBrowser()" style="background: #ef4444;">
                            ⏹️ Close Browser
                        </button>
                    </div>

                    <div id="browserStatus" style="margin-top: 15px; padding: 10px; background: var(--bg-secondary); border-radius: 6px; display: none;">
                        <strong style="color: var(--text-primary);">Browser Status:</strong>
                        <div id="browserStatusText" style="color: var(--text-secondary);"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
