<!DOCTYPE html>
<html>
<head>
    <title>Module Test</title>
</head>
<body>
    <h1>Module Function Test</h1>
    <div id="results"></div>
    
    <button onclick="testGenerateCode()">Test generateCode</button>
    <textarea id="promptInput">test prompt</textarea>
    <select id="languageSelector"><option value="python">Python</option></select>
    <input type="checkbox" id="executeCheckbox">
    <input type="text" id="executeUrl" value="http://test.com">
    
    <script src="/web/js/config.js"></script>
    <script src="/web/js/auth.js"></script>
    <script src="/web/js/navigation.js"></script>
    <script src="/web/js/dashboard.js"></script>
    <script src="/web/js/code-generation.js"></script>
    <script src="/web/js/utils.js"></script>
    
    <script>
        function testGenerateCode() {
            const results = document.getElementById('results');
            results.innerHTML = '';
            
            // Test if functions exist
            results.innerHTML += `<p>window.generateCode exists: ${typeof window.generateCode === 'function'}</p>`;
            results.innerHTML += `<p>window.showLoading exists: ${typeof window.showLoading === 'function'}</p>`;
            results.innerHTML += `<p>window.API_URL: ${window.API_URL}</p>`;
            
            // Test if elements exist
            results.innerHTML += `<p>promptInput exists: ${document.getElementById('promptInput') !== null}</p>`;
            
            // Try to call
            try {
                if (typeof window.generateCode === 'function') {
                    results.innerHTML += `<p style="color: green;">Calling generateCode...</p>`;
                    window.generateCode();
                } else {
                    results.innerHTML += `<p style="color: red;">generateCode not found!</p>`;
                }
            } catch (e) {
                results.innerHTML += `<p style="color: red;">Error: ${e.message}</p>`;
            }
        }
        
        // Auto test on load
        window.addEventListener('DOMContentLoaded', () => {
            console.log('Testing module loading...');
            console.log('window.generateCode:', typeof window.generateCode);
            console.log('window.API_URL:', window.API_URL);
        });
    </script>
</body>
</html>
